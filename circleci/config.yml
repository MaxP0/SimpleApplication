version: 2.1

workflows:
  version: 2
  build_test_deploy:
    jobs:
      - build_and_test
      - deploy:
          requires:
            - build_and_test
          filters:
            branches:
              only: main

jobs:
  build_and_test:
    working_directory: ~/project
    docker:
      - image: cimg/node:18.16.0
    steps:
      - checkout
      
      - run:
          name: Install Dependencies
          command: npm install
          
      - run:
          name: Run Unit Tests
          command: npm run test 

      - run:
          name: Truffle Compile
          command: npx truffle compile

      - run:
          name: Security Scan (npm audit)
          command: npm audit || true 