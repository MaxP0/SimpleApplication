version: 2.1

workflows:
  version: 2
  build_test_deploy:
    jobs:
      - build_and_test
      - deploy:
          requires:
            - build_and_test
          filters:
            branches:
              only: main

jobs:
  build_and_test:
    working_directory: ~/project
    docker:
      - image: cimg/node:18.16.0
    steps:
      - checkout

      - restore_cache:
          keys:
            - v1-deps-{{ checksum "package-lock.json" }}
            - v1-deps-

      - run:
          name: Install Dependencies
          command: npm install

      - save_cache:
          key: v1-deps-{{ checksum "package-lock.json" }}
          paths:
            - node_modules

      - run:
          name: Run Unit Tests
          command: npm run test

      - run:
          name: Security Scan (npm audit)
          command: npm audit --audit-level=high

  deploy:
    working_directory: ~/project
    docker:
      - image: cimg/node:18.16.0
    steps:
      - checkout
      - add_ssh_keys:
          fingerprints:
            - "SHA256:6TB/PiDNp/WtG622I7YWDXg7GmVLDsK2vn7kD4Gf2IQ"
      - run:
          name: Deploy to AWS via SSH
          command: |
            ssh -o StrictHostKeyChecking=no ubuntu@$SERVER_IP "
              if [ -d ~/app/.git ]; then
                cd ~/app && git pull origin main
              else
                git clone https://github.com/MaxP0/SimpleApplication.git ~/app
              fi &&
              cd ~/app &&
              npm install --omit=dev &&
              sudo pm2 describe SimpleApplication > /dev/null 2>&1 \
                && sudo pm2 restart SimpleApplication \
                || sudo pm2 start bin/www --name SimpleApplication &&
              sudo pm2 save
            "